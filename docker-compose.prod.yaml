services:
  db:
    image: mysql:8.4
    container_name: canvasclues-mysql
    restart: always
    environment:
      TZ: $DB_LANG
      MYSQL_ROOT_PASSWORD: $DB_PASS
      MYSQL_DATABASE: $DB_NAME
      MYSQL_USER: $DB_USER
      MYSQL_PASSWORD: $DB_USER_PASSWORD
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$DB_PASS"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: canvasclues-backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://db:3306/${DB_NAME}
      DB_USER: $DB_USER
      DB_USER_PASSWORD: $DB_USER_PASSWORD
      NAME_BACKEND: $NAME_BACKEND
      PORT_BACKEND: $PORT_BACKEND
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ./src/front-end
      dockerfile: Dockerfile
    container_name: canvasclues-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: canvasclues-tunnel
    restart: always
    profiles:
      - tunnel
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      - frontend
    networks:
      - internal

volumes:
  db-data:

networks:
  internal:
