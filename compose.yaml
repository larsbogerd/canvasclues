services:
  db:
    image: mysql:8.4
    container_name: codenames-mysql
    restart: always
    environment:
      TZ: Europe/Amsterdam
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: codenames_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    volumes:
      - ./sqldata:/var/lib/mysql:Z
    ports:
      - "3306:3306"