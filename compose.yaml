services:
  db:
    image: mysql:8.4
    container_name: canvasclues-mysql
    restart: always
    environment:
      TZ: $DB_LANG
      MYSQL_ROOT_PASSWORD: $DB_PASS
      MYSQL_DATABASE: $DB_NAME
      MYSQL_USER: $DB_USER
      MYSQL_PASSWORD: $DB_USER_PASSWORD
    volumes:
      - ./sqldata:/var/lib/mysql:Z
    ports:
      - "3306:3306"