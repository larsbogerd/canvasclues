trigger:
  - main

pr:
  - main

pool:
  vmImage: ubuntu-latest

steps:

  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '21'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'
    displayName: 'Set up Java 21'

  - script: mvn checkstyle:check
    displayName: 'Run Checkstyle'